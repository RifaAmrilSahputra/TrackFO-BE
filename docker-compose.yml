services:
  app:
    build: .
    container_name: trackfo_app
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: "mysql://root:password@db:3306/trackfo"
      JWT_SECRET: "secret"
    volumes:
      - .:/app:Z
      - /app/node_modules
    command: npm run dev

  db:
    image: mysql:8
    container_name: trackfo_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: trackfo
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: trackfo_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: password
    depends_on:
      - db

volumes:
  db_data: